{%extends "base.html"%}

{%block encabezado%}
    <title>{{ titulo }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        h1{
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        form {
            border-radius: 5px;
            background-color: #f2f2f2;
            padding: 20px;
            width: 40%;
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;

            
        }

        label {
            display: block;
        }

        input[type=text],
        select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            display: inline-block;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        input[type=submit] {
            width: 100%;
            background-color: #4CAF50;
            color: white;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        input[type=submit]:hover {
            background-color: #45a049;
        }
    </style>
{%endblock%}
{%block contenido%}
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <table>
            {{ form }}
        </table>
        <br>
        <input type="submit" value=Hacer>
    </form>
{%endblock%}
